[build]
  command = "npm install && npm install --prefix client && npm run build --prefix client"
  publish = "client/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/parse-recipe"
  to = "/.netlify/functions/parse-recipe"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
